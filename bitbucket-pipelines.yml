# Bitbucket Pipelines — ECS multi-environment CD
# Same flow as GitHub Actions: Dev auto, Test/Stage/Prod manual

image: node:20-bookworm

options:
  max-time: 45

definitions:
  services:
    docker:
      memory: 3072

  caches:
    npm: node_modules

  scripts:
    - &install-aws |
        apt-get update && apt-get install -y awscli python3 curl
        export AWS_DEFAULT_REGION=${AWS_REGION:-eu-north-1}
        chmod +x scripts/bitbucket-deploy-ecs.sh

  steps:
    - step: &ci-step
        name: CI — test and lint
        caches:
          - npm
        script:
          - npm ci
          - npm test
          - npm run lint

pipelines:
  default:
    - step: *ci-step

  pull-requests:
    '**':
      - step: *ci-step

  branches:
    main:
      - step: *ci-step
      - step:
          name: Deploy to Development
          deployment: development
          services:
            - docker
          caches:
            - npm
          script:
            - *install-aws
            - export BUILD_IMAGE=true
            - ./scripts/bitbucket-deploy-ecs.sh dev

  custom:
    setup-all-environments:
      - step:
          name: Setup infra — all environments
          script:
            - *install-aws
            - export SETUP_INFRA_ONLY=true BUILD_IMAGE=false
            - ./scripts/bitbucket-deploy-ecs.sh dev
            - ./scripts/bitbucket-deploy-ecs.sh test
            - ./scripts/bitbucket-deploy-ecs.sh stage
            - ./scripts/bitbucket-deploy-ecs.sh prod

    promote-to-testing:
      - step:
          name: Promote to Testing (manual)
          deployment: testing
          services:
            - docker
          script:
            - *install-aws
            - export BUILD_IMAGE=false IMAGE_TAG=${PROMOTE_IMAGE_TAG:-dev-latest}
            - ./scripts/bitbucket-deploy-ecs.sh test

    promote-to-stage:
      - step:
          name: Promote to Stage (manual)
          deployment: stage
          services:
            - docker
          script:
            - *install-aws
            - export BUILD_IMAGE=false IMAGE_TAG=${PROMOTE_IMAGE_TAG:-dev-latest}
            - ./scripts/bitbucket-deploy-ecs.sh stage

    promote-to-production:
      - step:
          name: Promote to Production (manual)
          deployment: production
          services:
            - docker
          script:
            - *install-aws
            - export BUILD_IMAGE=false IMAGE_TAG=${PROMOTE_IMAGE_TAG:-dev-latest}
            - ./scripts/bitbucket-deploy-ecs.sh prod
