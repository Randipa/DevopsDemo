services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: devops-demo:latest
    container_name: devops-demo-app
    ports:
      - "${HOST_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
