name: ECS Deploy (Reusable)

on:
  workflow_call:
    inputs:
      github_environment:
        description: GitHub Environment name
        required: true
        type: string
      env_key:
        description: dev, test, stage, or prod
        required: true
        type: string
      build_image:
        description: Build and push a new Docker image
        required: true
        type: boolean
      image_tag:
        description: Existing ECR tag when build_image is false
        required: false
        type: string
        default: dev-latest

env:
  AWS_REGION: eu-north-1
  BASE_ECR_REPO: devops-demo
  CONTAINER_NAME: app

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.github_environment }}
    env:
      APP_NAME: devops-demo-${{ inputs.env_key }}
      STACK_NAME: devops-ecs-${{ inputs.env_key }}
      ECS_CLUSTER: devops-demo-${{ inputs.env_key }}-cluster
      ECS_SERVICE: devops-demo-${{ inputs.env_key }}-service
      DEPLOY_ENV: ${{ inputs.github_environment }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure shared ECR repository
        run: |
          if aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names "${BASE_ECR_REPO}" >/dev/null 2>&1; then
            echo "ECR repository ${BASE_ECR_REPO} already exists (OK)."
          else
            echo "Creating ECR repository ${BASE_ECR_REPO}..."
            aws ecr create-repository \
              --region "${AWS_REGION}" \
              --repository-name "${BASE_ECR_REPO}" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Ensure AWS infrastructure
        run: |
          set +e
          STATUS=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null)
          if [[ "${STATUS}" == "ROLLBACK_COMPLETE" ]] || [[ "${STATUS}" == "ROLLBACK_FAILED" ]] || [[ "${STATUS}" == "CREATE_FAILED" ]]; then
            echo "Stack ${STACK_NAME} is in failed state (${STATUS})."
            echo "AWS Console → CloudFormation → delete ${STACK_NAME}, then re-run."
            echo "If you see ResourceExistenceCheck errors, delete old stack devops-ecs-simple first."
            exit 1
          fi
          set -e
          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --template-file infra/cloudformation-ecs-simple.yaml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              AppName="${APP_NAME}" \
              Environment="${{ inputs.env_key }}" \
              BaseECRRepo="${BASE_ECR_REPO}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset
          aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, test, and push image
        if: inputs.build_image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          npm ci
          npm test
          docker build -t "${ECR_REGISTRY}/${BASE_ECR_REPO}:${IMAGE_TAG}" .
          docker tag "${ECR_REGISTRY}/${BASE_ECR_REPO}:${IMAGE_TAG}" \
            "${ECR_REGISTRY}/${BASE_ECR_REPO}:dev-latest"
          docker push "${ECR_REGISTRY}/${BASE_ECR_REPO}:${IMAGE_TAG}"
          docker push "${ECR_REGISTRY}/${BASE_ECR_REPO}:dev-latest"
          echo "image=${ECR_REGISTRY}/${BASE_ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Deployed image tag: ${IMAGE_TAG} (also tagged dev-latest)"

      - name: Resolve promoted image
        if: ${{ !inputs.build_image }}
        id: promote-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          echo "Promoting existing image tag: ${IMAGE_TAG}"
          aws ecr describe-images \
            --region "${AWS_REGION}" \
            --repository-name "${BASE_ECR_REPO}" \
            --image-ids "imageTag=${IMAGE_TAG}" \
            >/dev/null
          echo "image=${ECR_REGISTRY}/${BASE_ECR_REPO}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Set deployment image URI
        id: deployment-image
        env:
          BUILD_IMAGE: ${{ inputs.build_image }}
          BUILT_URI: ${{ steps.build-image.outputs.image }}
          PROMOTED_URI: ${{ steps.promote-image.outputs.image }}
        run: |
          if [ "${BUILD_IMAGE}" = "true" ]; then
            echo "uri=${BUILT_URI}" >> "$GITHUB_OUTPUT"
          else
            echo "uri=${PROMOTED_URI}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --region "${AWS_REGION}" \
            --task-definition "${APP_NAME}" \
            --query taskDefinition > task-def.json

      - name: Render new task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.deployment-image.outputs.uri }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: false

      - name: Start ECS service
        run: |
          aws ecs update-service \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --service "${ECS_SERVICE}" \
            --desired-count 1 \
            --force-new-deployment
          aws ecs wait services-stable \
            --region "${AWS_REGION}" \
            --cluster "${ECS_CLUSTER}" \
            --services "${ECS_SERVICE}"

      - name: Print deployment URLs
        run: |
          ALB=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query "Stacks[0].Outputs[?OutputKey=='LoadBalancerDNS'].OutputValue" \
            --output text)
          HEALTH="http://${ALB}/health"
          INFO="http://${ALB}/api/info"
          echo "## ${DEPLOY_ENV} deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Health | ${HEALTH} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App info | ${INFO} |" >> "$GITHUB_STEP_SUMMARY"
          echo ""
          echo "Environment: ${DEPLOY_ENV}"
          echo "Health:  ${HEALTH}"
          echo "Info:    ${INFO}"
          curl -sf "${HEALTH}" | head -c 500
          echo ""
