name: Delete AWS Cloud Stacks

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1

jobs:
  delete-stacks:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete environment stacks
        run: |
          for STACK in devops-ecs-dev devops-ecs-test devops-ecs-stage devops-ecs-prod devops-ecs-simple; do
            echo "Deleting ${STACK}..."
            aws cloudformation delete-stack \
              --region "${AWS_REGION}" \
              --stack-name "${STACK}" || true
          done
          echo "Also deleting legacy stack devops-dev-env if present..."
          aws cloudformation delete-stack \
            --region "${AWS_REGION}" \
            --stack-name devops-dev-env || true
          echo "Wait for DELETE_COMPLETE in AWS Console → CloudFormation."
