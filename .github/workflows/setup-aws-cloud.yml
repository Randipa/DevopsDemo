name: Setup All Environments (Infra)

on:
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  BASE_ECR_REPO: devops-demo

jobs:
  ensure-ecr:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure shared ECR repository
        run: |
          if aws ecr describe-repositories \
            --region "${AWS_REGION}" \
            --repository-names "${BASE_ECR_REPO}" >/dev/null 2>&1; then
            echo "ECR repository ${BASE_ECR_REPO} already exists."
          else
            aws ecr create-repository \
              --region "${AWS_REGION}" \
              --repository-name "${BASE_ECR_REPO}" \
              --image-scanning-configuration scanOnPush=true
          fi

  setup:
    needs: ensure-ecr
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - env_key: dev
            github_environment: development
          - env_key: test
            github_environment: testing
          - env_key: stage
            github_environment: stage
          - env_key: prod
            github_environment: production
    environment: ${{ matrix.github_environment }}
    env:
      APP_NAME: devops-demo-${{ matrix.env_key }}
      STACK_NAME: devops-ecs-${{ matrix.env_key }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation stack
        run: |
          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --template-file infra/cloudformation-ecs-simple.yaml \
            --stack-name "${STACK_NAME}" \
            --parameter-overrides \
              AppName="${APP_NAME}" \
              Environment="${{ matrix.env_key }}" \
              BaseECRRepo="${BASE_ECR_REPO}" \
            --capabilities CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset

      - name: Show stack outputs
        run: |
          echo "## ${{ matrix.github_environment }}" >> "$GITHUB_STEP_SUMMARY"
          aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${STACK_NAME}" \
            --query 'Stacks[0].Outputs' \
            --output table >> "$GITHUB_STEP_SUMMARY"
